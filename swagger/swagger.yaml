definitions:
  handler.SetLogLevelRequest:
    properties:
      level:
        enum:
        - debug
        - info
        - warn
        - error
        - dpanic
        - panic
        - fatal
        type: string
    required:
    - level
    type: object
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: TalkABC 聊天交友平台后端 API 文档
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: TalkABC API
  version: "1.0"
paths:
  /ads/banners:
    get:
      consumes:
      - application/json
      description: 获取最新展示的广告横幅列表，用于首页广告展示
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 获取失败
          schema:
            additionalProperties: true
            type: object
      summary: 获取最新广告横幅
      tags:
      - 广告
  /auth/change-phone:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: |-
        已登录用户更换绑定的手机号，更换成功后需使用新手机号重新登录

        **安全防护机制：**
        - 身份验证：必须已登录状态（JWT验证）
        - 格式校验：验证新手机号格式正确性
        - 唯一性校验：确保新手机号未被注册
        - 验证码验证：验证新手机号的短信验证码
        - 频率限制：24小时内最多更换3次手机号
        - 登录态清理：更换成功后清空所有登录态
        - 操作审计：记录操作日志，日志不可删除
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 新手机号
        in: formData
        name: new_phone
        required: true
        type: string
      - description: 新手机号验证码
        in: formData
        name: code
        required: true
        type: string
      - description: 设备ID
        in: formData
        name: device_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 更换成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误或安全校验失败
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未登录
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 更换失败
          schema:
            additionalProperties: true
            type: object
      summary: 更换手机号
      tags:
      - 认证
  /auth/code-alnum:
    get:
      consumes:
      - application/json
      description: |-
        使用base64Captcha生成数字图形验证码图片，返回验证码ID和base64编码的图片数据

        **安全机制：**
        - 有效期控制：验证码有效期5分钟（通过Redis TTL自动过期）
        - 不可预测：使用base64Captcha库生成安全的图形验证码，防止自动化识别
        - 安全存储：验证码存储在Redis中，不记录到日志文件
      produces:
      - application/json
      responses:
        "200":
          description: 生成成功
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 生成失败
          schema:
            additionalProperties: true
            type: object
      summary: 生成图形验证码
      tags:
      - 认证
  /auth/code-alnum/verify:
    post:
      consumes:
      - application/json
      description: |-
        验证客户端传入的图形验证码是否正确

        **安全机制：**
        - 一次性使用：验证通过后立即删除验证码，防止重复使用
        - 过期处理：验证码过期或不存在时返回错误
      parameters:
      - description: 包含captcha_id和code
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 验证成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误或验证码不正确
          schema:
            additionalProperties: true
            type: object
      summary: 验证图形验证码
      tags:
      - 认证
  /auth/code-sms:
    get:
      consumes:
      - application/json
      description: |-
        向指定手机号发送6位短信验证码，用于身份验证

        **验证码安全机制：**
        - 有效期控制：验证码有效期5分钟（通过Redis TTL自动过期）
        - 格式规范：6位纯数字验证码
        - 发送间隔：每个手机号60秒内只能发送一次（服务器端严格校验）
        - 唯一性：同一手机号同一时间只有一个有效验证码（最新的为准）
        - 一次性使用：验证码验证后立即删除，不可重复使用
        - 日志脱敏：验证码内容不记录到日志文件，保护用户隐私
        - 图形验证码保护：发送前验证图形验证码（每日首次发送可免图形验证码）
        - 频率限制：1小时内同一手机号最多发送10次
        - 业务隔离：不同业务类型的验证码独立隔离（通过tag区分，如register、login）
      parameters:
      - description: 手机号
        in: query
        name: phonenum
        required: true
        type: string
      - description: 图形验证码ID（非每日首次发送时必填）
        in: query
        name: captcha_id
        type: string
      - description: 图形验证码（非每日首次发送时必填）
        in: query
        name: captcha_code
        type: string
      - description: 业务标签，允许的值：register(注册)、login(登录)、change_phone(更换手机号)、reset_password(重置密码)
        in: query
        name: tag
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 发送成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误或验证失败
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 发送失败
          schema:
            additionalProperties: true
            type: object
      summary: 发送短信验证码
      tags:
      - 认证
  /auth/code-sms/verify:
    post:
      consumes:
      - application/json
      description: |-
        验证客户端传入的短信验证码是否正确

        **安全机制：**
        - 原子操作：使用Lua脚本保证验证和删除的原子性，防止并发攻击
        - 一次性使用：无论验证是否成功，验证码都会被删除
        - 业务隔离：不同业务类型的验证码独立验证（通过tag区分）
      parameters:
      - description: 包含phonenum(手机号)、code(验证码)、tag(业务标签，允许的值：register、login、change_phone、reset_password)
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 验证成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误或验证码不正确
          schema:
            additionalProperties: true
            type: object
      summary: 验证短信验证码
      tags:
      - 认证
  /auth/login/code:
    post:
      consumes:
      - application/json
      description: |-
        使用手机号和短信验证码完成用户登录，登录成功后返回访问令牌和刷新令牌

        **安全防护机制：**
        - IP黑名单检测：拒绝来自恶意IP的请求
        - 频率限制：同一IP每分钟最多10次登录尝试
        - 账号风控：检查手机号、设备是否在黑名单中
        - 失败锁定：5分钟内连续5次失败，账号锁定15分钟
        - 状态校验：验证用户账号状态（正常/封禁/注销）
        - 验证码防复用：登录成功后立即清理验证码
        - 操作审计：记录完整的登录日志（用户ID、IP、UA、操作类型），日志不可删除
      parameters:
      - description: 手机号
        in: formData
        name: phonenum
        required: true
        type: string
      - description: 验证码
        in: formData
        name: code
        required: true
        type: string
      - description: 设备ID
        in: formData
        name: device_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功，返回access_token和refresh_token
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误或安全校验失败
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 登录失败
          schema:
            additionalProperties: true
            type: object
      summary: 验证码登录
      tags:
      - 认证
  /auth/login/oauth:
    post:
      consumes:
      - application/json
      description: |-
        使用第三方平台凭证完成用户登录，支持Apple、Google、微信、支付宝、Email五种登录方式

        **支持的登录方式及所需参数：**
        - Apple登录：需提供 id_token 参数
        - Google登录：需提供 id_token 参数
        - 微信登录：需提供 code 参数
        - 支付宝登录：需提供 code 参数
        - 邮箱登录：需提供 email 参数

        **安全防护机制：**
        - 凭证验证：验证第三方平台返回的凭证有效性
        - 新用户自动注册：首次登录时自动创建用户账号
        - 账号绑定检测：已绑定的第三方账号直接登录
        - 状态校验：验证用户账号状态（正常/封禁/注销）
        - 操作审计：记录完整的登录日志，日志不可删除
      parameters:
      - description: 登录方式：apple/google/wechat/alipay/email
        in: formData
        name: provider
        required: true
        type: string
      - description: 授权码（微信、支付宝登录使用）
        in: formData
        name: code
        type: string
      - description: ID令牌（Apple、Google登录使用）
        in: formData
        name: id_token
        type: string
      - description: 邮箱地址（邮箱登录使用）
        in: formData
        name: email
        type: string
      - description: 设备ID
        in: formData
        name: device_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功，返回access_token、refresh_token、new_user
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误或验证失败
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 登录失败
          schema:
            additionalProperties: true
            type: object
      summary: 第三方登录
      tags:
      - 认证
  /auth/login/password:
    post:
      consumes:
      - application/json
      description: |-
        使用手机号和密码完成用户登录，登录成功后返回访问令牌和刷新令牌

        **安全防护机制：**
        - IP黑名单检测：拒绝来自恶意IP的请求
        - 频率限制：同一IP每分钟最多10次登录尝试
        - 账号风控：检查手机号、设备是否在黑名单中
        - 失败锁定：5分钟内连续5次失败，账号锁定15分钟
        - 状态校验：验证用户账号状态（正常/封禁/注销）
        - 失败计数重置：登录成功后清零失败次数
        - 操作审计：记录完整的登录日志（用户ID、IP、UA、操作类型），日志不可删除

        **密码安全：** 使用bcrypt算法加密存储（cost=10，自动内置随机盐）
      parameters:
      - description: 手机号
        in: formData
        name: phonenum
        required: true
        type: string
      - description: 密码
        in: formData
        name: pwd
        required: true
        type: string
      - description: 设备ID
        in: formData
        name: device_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功，返回access_token和refresh_token
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误或安全校验失败
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 登录失败
          schema:
            additionalProperties: true
            type: object
      summary: 密码登录
      tags:
      - 认证
  /auth/logout:
    post:
      consumes:
      - application/json
      description: 用户安全退出登录，强制下线所有设备并清除登录状态
      produces:
      - application/json
      responses:
        "200":
          description: 退出成功
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 退出登录
      tags:
      - 认证
  /auth/oauth/bind:
    post:
      consumes:
      - application/json
      description: 将第三方平台账号绑定到当前登录用户，绑定后可使用该第三方平台直接登录
      parameters:
      - description: 绑定方式：apple/google/wechat/alipay/email
        in: formData
        name: provider
        required: true
        type: string
      - description: 授权码（微信、支付宝绑定使用）
        in: formData
        name: code
        type: string
      - description: ID令牌（Apple、Google绑定使用）
        in: formData
        name: id_token
        type: string
      - description: 邮箱地址（邮箱绑定使用）
        in: formData
        name: email
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 绑定成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误或验证失败
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未登录
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 绑定失败
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 绑定第三方账号
      tags:
      - 认证
  /auth/oauth/list:
    get:
      consumes:
      - application/json
      description: 获取当前登录用户已绑定的所有第三方平台账号列表
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功，返回已绑定的provider列表
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未登录
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 获取失败
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取已绑定的第三方账号列表
      tags:
      - 认证
  /auth/oauth/unbind:
    post:
      consumes:
      - application/json
      description: 解绑当前登录用户的第三方平台账号，解绑后将无法使用该第三方平台登录
      parameters:
      - description: 解绑方式：apple/google/wechat/alipay/email
        in: formData
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 解绑成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未登录
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 解绑失败
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 解绑第三方账号
      tags:
      - 认证
  /auth/refresh-token:
    post:
      consumes:
      - application/json
      description: |-
        使用刷新令牌获取新的访问令牌和刷新令牌，实现令牌轮转机制

        **安全防护机制：**
        - 令牌格式校验：验证刷新令牌必须包含随机部分和JWT部分
        - 签名验证：确保令牌的完整性和合法性
        - 存储校验：验证令牌在Redis中的有效性，防止令牌滥用
        - 用户状态检查：确认用户账号状态正常
        - 令牌轮转：生成全新的访问令牌和刷新令牌
        - 旧令牌失效：将新令牌保存到Redis，旧令牌立即失效
        - 操作审计：记录令牌刷新日志，日志不可删除
      parameters:
      - description: 刷新令牌
        in: formData
        name: refresh_token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 刷新成功，返回新的access_token和refresh_token
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 刷新令牌无效或已过期
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 刷新失败
          schema:
            additionalProperties: true
            type: object
      summary: 刷新访问令牌
      tags:
      - 认证
  /auth/register:
    post:
      consumes:
      - application/json
      description: |-
        使用手机号、验证码和密码完成用户注册，注册成功后自动登录并返回访问令牌和刷新令牌

        **安全防护机制：**
        - IP黑名单检测：拒绝来自恶意IP的请求
        - 注册频率限制：同一IP每分钟最多10次注册尝试
        - 手机号风控：检查手机号是否在黑名单中
        - 唯一性校验：确保手机号未被注册
        - 设备风控：检查设备是否在黑名单中
        - 验证码防复用：注册成功后立即清理验证码
        - 操作审计：记录完整的注册日志，日志不可删除

        **密码安全策略：**
        - 长度要求：至少8个字符
        - 复杂度要求：至少包含两种字符类型（大写字母、小写字母、数字、特殊符号）
        - 弱密码拦截：禁止使用常见弱密码
        - 关联检测：禁止包含手机号、昵称或邮箱前缀
      parameters:
      - description: 手机号
        in: formData
        name: phonenum
        required: true
        type: string
      - description: 验证码
        in: formData
        name: code
        required: true
        type: string
      - description: 密码（≥8位，至少包含两种字符类型）
        in: formData
        name: password
        required: true
        type: string
      - description: 设备ID
        in: formData
        name: device_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 注册成功，返回access_token和refresh_token
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误或安全校验失败
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 注册失败
          schema:
            additionalProperties: true
            type: object
      summary: 用户注册
      tags:
      - 认证
  /auth/reset-password/complete:
    post:
      consumes:
      - application/json
      description: |-
        使用重置Token完成密码重置操作，设置新密码

        **密码安全策略：**
        - 长度要求：至少8个字符
        - 复杂度要求：至少包含两种字符类型（大写字母、小写字母、数字、特殊符号）
        - 弱密码拦截：禁止使用常见弱密码
        - 关联检测：禁止包含手机号、昵称或邮箱前缀
        - 历史检查：禁止与最近5次密码重复
        - 安全存储：使用bcrypt算法加密（cost=10，自动内置随机盐）

        **安全防护机制：**
        - 登录态清理：重置成功后清空该用户全部登录态（Redis token等）
        - Token清理：清空所有未使用的重置Token
        - 信息安全：绝不返回原始密码或加密密码
        - 操作审计：记录敏感操作日志，日志不可删除
        - 设备验证：验证Token绑定的设备标识，防止跨账号盗用
      parameters:
      - description: 重置Token
        in: formData
        name: token
        required: true
        type: string
      - description: 新密码
        in: formData
        name: pwd1
        required: true
        type: string
      - description: 确认密码
        in: formData
        name: pwd2
        required: true
        type: string
      - description: 设备ID
        in: formData
        name: device_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 重置成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误或密码校验失败
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 重置失败
          schema:
            additionalProperties: true
            type: object
      summary: 完成密码重置
      tags:
      - 认证
  /auth/reset-password/initiate:
    post:
      consumes:
      - application/json
      description: |-
        根据手机号发起密码重置流程，生成安全的重置Token并发送给用户

        **安全防护机制：**
        - 频率限制：同一账号24小时内最多允许3次密码重置，超限后锁定重置通道24小时
        - 操作审计：记录敏感操作日志（用户ID、IP、UA、操作类型），日志不可删除

        **Token安全设计：**
        - 单次有效：使用一次后立即销毁，不可重复使用
        - 短有效期：仅5分钟，过期自动失效
        - 不可预测：使用crypto/rand生成随机Token，防止猜测攻击
        - 绑定验证：Token绑定userID和设备标识，防止跨账号盗用
        - 安全存储：数据库仅存储Token的sha256哈希值，不存储明文
      parameters:
      - description: 手机号
        in: formData
        name: phonenum
        required: true
        type: string
      - description: 设备ID
        in: formData
        name: device_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 发起成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误或频率限制
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 发起失败
          schema:
            additionalProperties: true
            type: object
      summary: 发起密码重置
      tags:
      - 认证
  /auth/reset-password/validate:
    get:
      consumes:
      - application/json
      description: |-
        验证密码重置Token是否有效（存在、未使用、未过期），用于前端预先校验重置链接

        **Token安全设计：**
        - 单次有效：使用一次后立即销毁，不可重复使用
        - 短有效期：仅5分钟，过期自动失效
        - 绑定验证：Token绑定userID和设备标识，防止跨账号盗用
        - 安全存储：数据库仅存储Token的sha256哈希值，不存储明文
      parameters:
      - description: 重置Token
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Token有效
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Token无效或已过期
          schema:
            additionalProperties: true
            type: object
      summary: 验证重置Token
      tags:
      - 认证
