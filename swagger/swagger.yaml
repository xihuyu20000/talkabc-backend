        - 敏感词过滤：禁止包含暴力、色情、政治敏感、诈骗等违规词汇
        - URL过滤：禁止包含 http/https/www 等超链接
        - HTML过滤：禁止包含HTML标签
        - JavaScript过滤：禁止包含脚本代码（如 <script>、eval()、alert()）
        - SQL注入过滤：禁止包含SQL注入代码（如 SELECT、INSERT、OR 1=1）
        - XSS过滤：禁止包含XSS攻击代码（如 onclick=、onerror=）
      parameters:
      - description: 签名内容
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 保存成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误或签名包含违规内容
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 保存失败
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 设置个性签名
      tags:
      - 个人资料
