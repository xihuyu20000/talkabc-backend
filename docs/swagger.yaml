basePath: /api/v1
definitions:
  response.Response:
    properties:
      code:
        description: 状态码：0-成功，其他-失败
        type: integer
      data:
        description: 响应数据
      msg:
        description: 响应消息
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: TalkABC 聊天交友平台后端 API 文档
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: TalkABC API
  version: "1.0"
paths:
  /ads/banners:
    get:
      consumes:
      - application/json
      description: 获取最新的广告横幅列表
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 获取失败
          schema:
            additionalProperties: true
            type: object
      summary: 获取最新广告横幅
      tags:
      - 广告
  /auth/code-alnum:
    get:
      consumes:
      - application/json
      description: 使用base64Captcha生成数字图形验证码图片，返回验证码ID和base64图片数据。安全规则：1. 验证码有效期5分钟（Redis
        TTL控制）；2. 使用base64Captcha库生成不可预测的验证码；3. 验证码存储在Redis中，不记录到日志文件
      produces:
      - application/json
      responses:
        "200":
          description: 生成成功
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 生成失败
          schema:
            additionalProperties: true
            type: object
      summary: 生成图形验证码
      tags:
      - 认证
  /auth/code-alnum/verify:
    post:
      consumes:
      - application/json
      description: 验证客户端传入的图形验证码是否正确。安全规则：1. 验证通过后立即删除验证码，防止重复使用；2. 验证码过期或不存在时返回错误
      parameters:
      - description: 包含captcha_id和code
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 验证成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误或验证码不正确
          schema:
            additionalProperties: true
            type: object
      summary: 验证图形验证码
      tags:
      - 认证
  /auth/code-sms:
    get:
      consumes:
      - application/json
      description: 向指定手机号发送短信验证码。安全规则：1. 验证码有效期5分钟（Redis TTL控制）；2. 验证码为6位纯数字；3. 每个手机号60秒内只能发送一次（服务器端校验）；4.
        同一手机号同一时间只有一个有效验证码（最新的为准）；5. 验证码最多使用1次（验证后立即删除）；6. 验证码不记录到日志文件；7. 发送前验证图形验证码（每日首次发送免图形验证码）；8.
        1小时内发送次数限制10次；9. 不同业务类型的验证码独立隔离（通过tag区分，如register、login）
      parameters:
      - description: 手机号
        in: query
        name: phonenum
        required: true
        type: string
      - description: 图形验证码ID（非每日首次发送时必填）
        in: query
        name: captcha_id
        type: string
      - description: 图形验证码（非每日首次发送时必填）
        in: query
        name: captcha_code
        type: string
      - description: 业务标签（如register、login，默认default）
        in: query
        name: tag
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 发送成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误或验证失败
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 发送失败
          schema:
            additionalProperties: true
            type: object
      summary: 发送短信验证码
      tags:
      - 认证
  /auth/code-sms/verify:
    post:
      consumes:
      - application/json
      description: 验证客户端传入的短信验证码是否正确。安全规则：1. 使用Lua脚本保证验证和删除的原子性；2. 验证码一次性使用（无论验证是否成功，验证码都会被删除）；3.
        不同业务类型的验证码独立验证（通过tag区分）
      parameters:
      - description: 包含phonenum、code、tag
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 验证成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误或验证码不正确
          schema:
            additionalProperties: true
            type: object
      summary: 验证短信验证码
      tags:
      - 认证
  /auth/login/code:
    post:
      consumes:
      - application/json
      description: 使用手机号和验证码登录。安全规则：1. IP黑名单检查；2. IP登录频率限制（1分钟10次）；3. 手机号黑名单检查；4.
        设备黑名单检查；5. 登录失败次数限制（5分钟内5次失败锁定15分钟）；6. 用户账号状态检查（正常/封禁/注销）；7. 登录成功后清理验证码，防止二次复用；8.
        记录登录操作日志（用户ID、IP、UA、操作类型、是否成功，不可删除）
      parameters:
      - description: 手机号
        in: formData
        name: phonenum
        required: true
        type: string
      - description: 验证码
        in: formData
        name: code
        required: true
        type: string
      - description: 设备ID
        in: formData
        name: device_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功，返回token
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误或安全校验失败
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 登录失败
          schema:
            additionalProperties: true
            type: object
      summary: 验证码登录
      tags:
      - 认证
  /auth/login/password:
    post:
      consumes:
      - application/json
      description: 使用手机号和密码登录。安全规则：1. IP黑名单检查；2. IP登录频率限制（1分钟10次）；3. 手机号黑名单检查；4. 设备黑名单检查；5.
        登录失败次数限制（5分钟内5次失败锁定15分钟）；6. 用户账号状态检查（正常/封禁/注销）；7. 登录成功后重置失败次数；8. 记录登录操作日志（用户ID、IP、UA、操作类型、是否成功，不可删除）；密码存储：使用bcrypt加密（cost=10，自动内置盐）
      parameters:
      - description: 手机号
        in: formData
        name: phonenum
        required: true
        type: string
      - description: 密码
        in: formData
        name: pwd
        required: true
        type: string
      - description: 设备ID
        in: formData
        name: device_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功，返回token
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误或安全校验失败
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 登录失败
          schema:
            additionalProperties: true
            type: object
      summary: 密码登录
      tags:
      - 认证
  /auth/logout:
    post:
      consumes:
      - application/json
      description: 用户退出登录，强制下线所有设备
      produces:
      - application/json
      responses:
        "200":
          description: 退出成功
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 退出登录
      tags:
      - 认证
  /auth/register:
    post:
      consumes:
      - application/json
      description: 使用手机号、验证码和密码进行注册。安全规则：1. IP黑名单检查；2. IP注册频率限制（1分钟10次）；3. 手机号黑名单检查；4.
        手机号唯一性检查；5. 设备黑名单检查；6. 密码复杂度校验（≥8位，至少包含两种字符类型：大写字母、小写字母、数字、特殊符号；禁止弱密码；禁止包含手机号/昵称/邮箱前缀）；7.
        注册成功后清理验证码；8. 记录注册操作日志（不可删除）
      parameters:
      - description: 手机号
        in: formData
        name: phonenum
        required: true
        type: string
      - description: 验证码
        in: formData
        name: code
        required: true
        type: string
      - description: 密码（≥8位，至少包含两种字符类型）
        in: formData
        name: password
        required: true
        type: string
      - description: 设备ID
        in: formData
        name: device_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 注册成功，返回token
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误或安全校验失败
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 注册失败
          schema:
            additionalProperties: true
            type: object
      summary: 用户注册
      tags:
      - 认证
  /auth/reset-password/complete:
    post:
      consumes:
      - application/json
      description: 使用重置Token设置新密码。安全规则：1. 密码复杂度校验（≥8位，至少包含两种字符类型：大写字母、小写字母、数字、特殊符号；禁止弱密码；禁止包含手机号/昵称/邮箱前缀；禁止与历史5次密码重复）；2.
        密码存储：使用bcrypt加密（cost=10，自动内置盐）；3. 重置成功后：清空该用户全部登录态（Redis token等）、清空所有未使用重置Token、绝不返回原始密码或加密密码；4.
        记录敏感操作日志（不可删除）；5. 设备验证：验证Token绑定的设备标识，防止跨账号盗用
      parameters:
      - description: 重置Token
        in: formData
        name: token
        required: true
        type: string
      - description: 新密码
        in: formData
        name: pwd1
        required: true
        type: string
      - description: 确认密码
        in: formData
        name: pwd2
        required: true
        type: string
      - description: 设备ID
        in: formData
        name: device_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 重置成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误或密码校验失败
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 重置失败
          schema:
            additionalProperties: true
            type: object
      summary: 完成密码重置
      tags:
      - 认证
  /auth/reset-password/initiate:
    post:
      consumes:
      - application/json
      description: 根据手机号发起密码重置，生成重置Token并发送。安全规则：1. 同一账号24h内最多允许3次密码重置，超限锁定重置通道24h；2.
        记录敏感操作日志（用户ID、IP、UA、操作类型、是否成功，不可删除）；3. Token设计：单次有效（使用后立即销毁）、短有效期（5分钟）、不可预测（crypto/rand生成）、绑定userID+设备标识、禁止明文存库（仅存储sha256哈希）
      parameters:
      - description: 手机号
        in: formData
        name: phonenum
        required: true
        type: string
      - description: 设备ID
        in: formData
        name: device_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 发起成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误或频率限制
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 发起失败
          schema:
            additionalProperties: true
            type: object
      summary: 发起密码重置
      tags:
      - 认证
  /auth/reset-password/validate:
    get:
      consumes:
      - application/json
      description: 验证重置Token是否存在、未使用、未过期。Token设计：单次有效、短有效期（5分钟）、绑定userID+设备标识、禁止明文存库（仅存储sha256哈希）
      parameters:
      - description: 重置Token
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Token有效
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Token无效或已过期
          schema:
            additionalProperties: true
            type: object
      summary: 验证重置Token
      tags:
      - 认证
  /friends/{uid}/{flag}:
    post:
      consumes:
      - application/json
      description: 添加指定用户为好友
      parameters:
      - description: 目标用户UID
        in: path
        name: uid
        required: true
        type: string
      - description: 操作标志：1-添加好友，0-取消关注
        in: path
        name: flag
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 操作成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 操作失败
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 添加好友
      tags:
      - 社交
  /gifts/send/{uid}/{giftid}:
    post:
      consumes:
      - application/json
      description: 向指定用户发送礼物
      parameters:
      - description: 接收用户UID
        in: path
        name: uid
        required: true
        type: string
      - description: 礼物ID
        in: path
        name: giftid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 发送成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 发送失败
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 发送礼物
      tags:
      - 社交
  /messages/latest:
    get:
      consumes:
      - application/json
      description: 获取当前用户与其他用户的最新消息列表
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 获取失败
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取最新用户消息
      tags:
      - 消息
  /messages/system:
    get:
      consumes:
      - application/json
      description: 获取当前用户的系统消息列表
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 获取失败
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取系统消息列表
      tags:
      - 消息
  /messages/users/{uid}:
    get:
      consumes:
      - application/json
      description: 获取与指定用户的聊天消息历史
      parameters:
      - description: 目标用户UID
        in: path
        name: uid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 获取失败
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取用户消息历史
      tags:
      - 消息
  /messages/users/{uid}/clear:
    post:
      consumes:
      - application/json
      description: 清除与指定用户的聊天记录
      parameters:
      - description: 目标用户UID
        in: path
        name: uid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 清除成功
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 清除失败
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 清除聊天记录
      tags:
      - 消息
  /messages/users/{uid}/top/{flag}:
    post:
      consumes:
      - application/json
      description: 设置或取消与指定用户的消息置顶
      parameters:
      - description: 目标用户UID
        in: path
        name: uid
        required: true
        type: string
      - description: 置顶标志：1-置顶，0-取消置顶
        in: path
        name: flag
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 设置成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 设置失败
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 设置消息置顶
      tags:
      - 消息
  /moments:
    get:
      consumes:
      - application/json
      description: 获取最新发布的动态列表
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 获取失败
          schema:
            additionalProperties: true
            type: object
      summary: 获取最新动态列表
      tags:
      - 动态
    post:
      consumes:
      - multipart/form-data
      description: 用户发布新动态，支持文本、图片和地理位置
      parameters:
      - description: 动态文本内容
        in: formData
        name: text
        required: true
        type: string
      - description: 地理位置
        in: formData
        name: location
        type: string
      - description: 图片文件列表
        in: formData
        name: files
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: 发布成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 发布失败
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 发布动态
      tags:
      - 动态
  /moments/{mid}/comments:
    get:
      consumes:
      - application/json
      description: 获取指定动态的评论列表
      parameters:
      - description: 动态ID
        in: path
        name: mid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 获取失败
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取动态评论列表
      tags:
      - 动态
  /moments/me:
    get:
      consumes:
      - application/json
      description: 获取当前用户发布的最新动态列表
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 获取失败
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取我的最新动态
      tags:
      - 动态
  /moments/users/{uid}:
    get:
      consumes:
      - application/json
      description: 获取指定用户发布的动态列表
      parameters:
      - description: 用户UID
        in: path
        name: uid
        required: true
        type: string
      produces:
