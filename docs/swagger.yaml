  /v1/onlinestatus:
    get:
      consumes:
      - application/json
      description: 查询指定用户的在线状态。通过JWT令牌获取当前用户ID，然后从Redis中查询该用户的在线状态。支持多端在线状态管理。
      produces:
      - application/json
      responses:
        "200":
          description: 在线状态数据
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 查询失败
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - ApiKeyAuth: []
      summary: 获取用户在线状态
      tags:
      - WebSocket
  /ws:
    get:
      consumes:
      - application/json
      description: 建立WebSocket连接，用于实时消息通信。客户端需携带JWT令牌进行身份认证。连接成功后，服务端会自动管理用户在线状态，并支持多端同时在线。
      parameters:
      - description: JWT令牌
        in: query
        name: token
        required: true
        type: string
      - description: 设备标识，不传则使用客户端IP
        in: query
        name: deviceId
        type: string
      produces:
      - application/json
      responses:
        "101":
          description: WebSocket连接升级成功
        "400":
          description: 缺少token或用户ID无效
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: token无效
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 连接升级失败
          schema:
            $ref: '#/definitions/response.Response'
      summary: WebSocket连接握手
      tags:
      - WebSocket
