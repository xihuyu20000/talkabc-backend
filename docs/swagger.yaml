basePath: /api/v1
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: TalkABC 聊天交友平台后端 API 文档
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: TalkABC API
  version: "1.0"
paths:
  /api/v1/ads/banners:
    get:
      consumes:
      - application/json
      description: 获取最新的广告横幅列表
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 获取失败
          schema:
            additionalProperties: true
            type: object
      summary: 获取最新广告横幅
      tags:
      - 广告
  /api/v1/auth/code-alnum:
    get:
      consumes:
      - application/json
      description: 向指定手机号发送字母数字组合的验证码
      parameters:
      - description: 手机号
        in: query
        name: phonenum
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 生成成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 生成失败
          schema:
            additionalProperties: true
            type: object
      summary: 生成字母数字验证码
      tags:
      - 认证
  /api/v1/auth/code-sms:
    get:
      consumes:
      - application/json
      description: 向指定手机号发送短信验证码
      parameters:
      - description: 手机号
        in: query
        name: phonenum
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 发送成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 发送失败
          schema:
            additionalProperties: true
            type: object
      summary: 发送短信验证码
      tags:
      - 认证
  /api/v1/auth/login/code:
    post:
      consumes:
      - application/json
      description: 使用手机号和验证码登录
      parameters:
      - description: 手机号
        in: formData
        name: phonenum
        required: true
        type: string
      - description: 验证码
        in: formData
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功，返回token
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 登录失败
          schema:
            additionalProperties: true
            type: object
      summary: 验证码登录
      tags:
      - 认证
  /api/v1/auth/login/password:
    post:
      consumes:
      - application/json
      description: 使用手机号和密码登录
      parameters:
      - description: 手机号
        in: formData
        name: phonenum
        required: true
        type: string
      - description: 密码
        in: formData
        name: pwd
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功，返回token
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 登录失败
          schema:
            additionalProperties: true
