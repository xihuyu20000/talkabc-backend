system:
  reset: 1              # 重置标志(0=不重置, 1=重置所有数据)

logger:
  level: debug          # 日志级别: debug, info, warn, error, fatal
  format: console       # 日志格式: console, json
  output: both          # 输出方式: console, file, both
  file_path: ./logs/app.log  # 日志文件路径
  max_size: 100         # 单个日志文件最大大小(MB)
  max_backups: 30       # 保留的最大日志文件数
  max_age: 7            # 日志文件保留天数
  compress: true        # 是否压缩归档日志
  
security:
  sms_valid_minutes: 5              # 短信验证码有效期，单位分钟
  sms_cooldown_seconds: 60          # 短信验证码冷却期，单位秒
  sms_hourly_limit: 10              # 1小时内发送次数限制，单位次
  ip_register_hourly_limit: 10      # 注册时1小时内每个IP发送次数限制，单位次
  ip_login_minute_limit: 10         # 登录时1分钟内每个IP登录次数限制，单位次
  login_failure_lock_minutes: 5     # 登录多次失败锁定时间，单位分钟
  require_daily_captcha: 1          # 是否启用每日首次免验证码规则（1=启用，0=所有请求都不需要验证码）

sms_provider:
  default: "aliyun"              # 默认短信服务商：aliyun, huawei, tencent
  aliyun:
    access_key_id: "LTAI5t5mcECvLgmdRVxh3Z84"             # 阿里云AccessKey ID
    access_key_secret: "JB6g95jjzjb92AHOmzEbcsJ0PRTyo"         # 阿里云AccessKey Secret
    region_id: "cn-hangzhou"      # 阿里云区域ID
    sign_name: "速通互联验证码"                 # 短信签名
    template_code: "100001"             # 短信模板Code
    scheme_name: "test"               # 短信方案名称（用于Dypnsapi）
    country_code: "86"            # 国家码，默认中国86
  huawei:
    app_key: ""                   # 华为云AppKey
    app_secret: ""               # 华为云AppSecret
    sign_name: ""                 # 短信签名
    template_id: ""               # 短信模板ID
  tencent:
    secret_id: ""                 # 腾讯云SecretID
    secret_key: ""                # 腾讯云SecretKey
    region_id: "ap-guangzhou"     # 腾讯云区域ID
    sign_name: ""                 # 短信签名
    template_id: ""               # 短信模板ID


server:
  port: 8080

database:
  host: localhost
  port: 5432
  user: postgres
  password: admin
  dbname: talkabc
  sslmode: disable

jwt:
  secret: talkabc_jwt_secret_key
  expires_hour: 24

upload:
  avatar_path: ./uploads/avatars
  moment_path: ./uploads/moments
  message_path: ./uploads/messages

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

cors:
  origins:
    - "*"              # 允许所有来源，生产环境请改为具体域名列表以避免CSRF风险
  methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  headers:
    - Origin
    - Content-Type
    - Authorization
    - Accept
    - X-Requested-With
  credentials: true
