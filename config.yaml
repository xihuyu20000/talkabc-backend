system:
  reset: 1              # 重置标志(0=不重置, 1=重置所有数据)
  sms_valid_minutes: 5  # 短信验证码有效期，单位分钟

server:
  port: 8080

database:
  host: localhost
  port: 5432
  user: postgres
  password: admin
  dbname: talkabc
  sslmode: disable

jwt:
  secret: talkabc_jwt_secret_key
  expires_hour: 24

upload:
  avatar_path: ./uploads/avatars
  moment_path: ./uploads/moments
  message_path: ./uploads/messages

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

cors:
  origins:
    - "*"              # 允许所有来源，生产环境请改为具体域名列表以避免CSRF风险
  methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  headers:
    - Origin
    - Content-Type
    - Authorization
    - Accept
    - X-Requested-With
  credentials: true